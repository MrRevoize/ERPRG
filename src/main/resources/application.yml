spring:
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true
    properties:
      hibernate:
        naming:
          physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
        dialect: org.hibernate.dialect.PostgreSQLDialect
#  main:
#      lazy-initialialization: tr
  web:
    resources:
      static-locations:
        - classpath:/static/
      cache:
        period: 0
  threads:
    virtual:
      enabled: true
#server: ${SERVER_PORT}
